name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # A from-scratch build compiles the heavy native_decide certificates and can
    # run long on a 2-4 core runner; lean-action caches .lake so later pushes are
    # incremental. If the parallel certificate builds run out of memory, pass a
    # smaller job count to lake (e.g. build-args: '-j2') or use a larger runner.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - name: Build Lean project (lake build + mathlib cache)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
      - name: Axiom report
        run: |
          ~/.elan/bin/lake env lean scripts/PublicAxiomsReport.lean | tee public_axioms.txt
          ~/.elan/bin/lake env lean scripts/AxiomsReport.lean | tee axioms.txt
      - name: Check public axiom allowlist
        # Theorem-specific parser: it pairs each named public theorem with its
        # own `#print axioms` block and checks that block against the allowlist
        # (not a global union of all blocks); it also fails on elaboration errors,
        # missing declarations, sorryAx, or any parsed block exceeding the list.
        run: |
          python3 - <<'PY'
          import pathlib, re, sys
          allowed = {
              "propext", "Classical.choice", "Quot.sound",
              "Lean.ofReduceBool", "Lean.trustCompiler",
          }
          required = [
              "Prop51.chenLarsonCoefficient_neg",
              "Prop51.chenLarsonCoefficient_ne_zero",
              "Prop52.correctedCoeff_nonvanishing",
              "Prop52.correctedCoeff_neg",
              "Prop52.sourceCorrectedCoeff_nonvanishing",
              "Prop52.sourceCorrectedCoeff_neg",
              "Prop52.chenLarsonProp52Coefficient_nonvanishing",
              "Prop52.chenLarsonProp52Coefficient_neg",
          ]
          text = pathlib.Path("public_axioms.txt").read_text() \
               + "\n" + pathlib.Path("axioms.txt").read_text()
          for bad in ("error:", "unknown identifier", "unknown constant"):
              if bad in text:
                  sys.exit(f"FAIL: axiom report contains {bad!r} (elaboration error / missing decl)")
          if "sorryAx" in text:
              sys.exit("FAIL: an audited theorem depends on sorryAx")
          # Pair each theorem with its OWN axiom block (theorem-specific, not a
          # global union); handle the "does not depend on any axioms" wording too.
          axioms_of = {}
          for m in re.finditer(r"'([^']+)' depends on axioms:\s*\[([^\]]*)\]", text):
              axioms_of[m.group(1)] = {n.strip() for n in m.group(2).split(",") if n.strip()}
          for m in re.finditer(r"'([^']+)' does not depend on any axioms", text):
              axioms_of.setdefault(m.group(1), set())
          problems = []
          for n in required:
              if n not in axioms_of:
                  problems.append(f"{n}: no axiom block found in report")
              elif axioms_of[n] - allowed:
                  problems.append(f"{n}: unexpected axioms {sorted(axioms_of[n] - allowed)}")
          if problems:
              sys.exit("FAIL (theorem-specific axiom check):\n  " + "\n  ".join(problems))
          # Defence in depth: no parsed block anywhere may exceed the allowlist.
          overall = {n: sorted(s - allowed) for n, s in axioms_of.items() if s - allowed}
          if overall:
              sys.exit(f"FAIL: blocks with unexpected axioms: {overall}")
          print(f"Axiom allowlist OK: {len(axioms_of)} theorem blocks; "
                f"all {len(required)} required theorems individually within {sorted(allowed)}")
          PY
      - name: Python certificate scripts (fast layer)
        run: |
          python3 -m py_compile scripts/*.py
          python3 scripts/constants_check.py
          python3 scripts/positive_saddle_scan.py --quick
      - name: Positive saddle generator smoke (legacy-regression)
        # NB: this exercises the historical tangent/exact-product generator
        # interface, kept as a regression guard. It is not the canonical
        # direct-saddle producer used by the final proof.
        run: |
          python3 -m py_compile scripts/positive_saddle_fixed_finite_template.py
          common=(
            --strategy combined-product-nk-tangent-solo-n-fixed-edge-k-chunked
            --product-row-len 1600
            --tangent-row-len 1600
            --solo-saddle-row-len 1600
            --solo-budget-row-len 1600
            --edge-row-len 1600
            --n-len 21600
            --product-k-len 1800
            --tangent-n-len 21600
            --solo-saddle-n-len 21600
            --solo-budget-n-len 21600
            --tangent-k-len 155
            --edge-k-len 1800
            --single-chunk-prefix ciSmokeChunk
            --name ciSmokeCert
          )
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-single-chunk-manifest --manifest-shard-count 2 | grep '"total": 5'
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-single-chunk-manifest --manifest-shard-count 2 | grep '"count": 3'
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-single-chunk-manifest --manifest-shard-count 2 | grep '"index": 4'
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-single-chunk-shard --shard-index 1 --shard-count 2 | grep 'Shard 2 of 2'
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-final --final-tail-bounds-parts | \
            grep 'PositiveSaddleLargeTailBoundsPartsAuditCertificate'
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-final --final-tail-atomic-bounds | \
            grep 'PositiveSaddleLargeTailAtomicBoundsAuditCertificate'
          # --extra-import injects an import only into the assembled (--emit-final)
          # output, which is what it is for; verify it there.
          python3 scripts/positive_saddle_fixed_finite_template.py "${common[@]}" \
            --emit-final --final-tail-atomic-bounds \
            --extra-import Prop51.Generated.CIAtoms | \
            grep 'import Prop51.Generated.CIAtoms'

  # Build the LaTeX paper so the source cannot silently become uncompilable.
  # Fails on any LaTeX error; runs latexmk (two passes for refs). This does NOT
  # check that the committed PDF matches the freshly built one.
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compile paper/prop51.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: prop51.tex
          latexmk_use_xelatex: false
